context:
  name: google-cloud-bigquery
  version: "3.41.0"

recipe:
  name: ${{ name|lower }}-split
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/${{ name|replace('-', '_') }}-${{ version }}.tar.gz
  sha256: 2217e488b47ed576360c9b2cc07d59d883a54b83167c0ef37f915c26b01a06fe

build:
  number: 0

outputs:
  - package:
      name: ${{ name }}
    build:
      noarch: python
    requirements:
      host:
        - python ${{ python_min }}.*
        - pip
        - setuptools
      run:
        - ${{ pin_subpackage('google-cloud-bigquery-core', exact=True) }}
        - python >=${{ python_min }}
        # bqstorage and pandas extras
        - pyarrow >=4.0.0
        # bqstorage extra
        - google-cloud-bigquery-storage >=2.6.0,<3.0.0
        # more restrictive constraint for py >=3.14
        - grpcio >=1.75.1,<2.0.0
        # pandas extra
        - pandas >=1.3.0
        - pandas-gbq >=0.26.1
        - db-dtypes >=1.0.4,<2.0.0
        # ipywidgets extra
        - ipywidgets >=7.7.1
        - ipykernel >=6.2.0
        # geopandas extra
        - geopandas >=0.9.0,<2.0.0
        - shapely >=1.8.4,<3.0.0
        # ipython extra
        - bigquery-magics >=0.6.0
        # leaving out the matplotlib extra for now because it doesn't
        # work with python 3.9 unless we move away from noarch: python
        # - matplotlib-base >=3.7.1,<=3.9.2  # [py<310]
        # - matplotlib-base >=3.10.3  # [py>=310]
        # tqdm extra
        - tqdm >=4.23.4,<5.0.0
        # opentelemetry extra
        - opentelemetry-api >=1.1.0
        - opentelemetry-sdk >=1.1.0
        - opentelemetry-instrumentation >=0.20b0
        # bigquery_v2 extra
        - proto-plus >=1.22.3,<2.0.0
        - protobuf >=3.20.2,<7.0.0,!=4.21.0,!=4.21.1,!=4.21.2,!=4.21.3,!=4.21.4,!=4.21.5
    tests:
      - python:
          imports:
            - google.api_core
            - google.cloud.bigquery
            - google.cloud.bigquery.client
            - google.cloud.bigquery.dataset
            - google.cloud.bigquery.encryption_configuration
            - google.cloud.bigquery.enums
            - google.cloud.bigquery.external_config
            - google.cloud.bigquery.job
            - google.cloud.bigquery.magics
            - google.cloud.bigquery.model
            - google.cloud.bigquery.query
            - google.cloud.bigquery.retry
            - google.cloud.bigquery.routine
            - google.cloud.bigquery.schema
            - google.cloud.bigquery.table
            - google.cloud.bigquery_v2
            - google.cloud.bigquery_v2.types
          pip_check: true
          python_version: ${{ python_min }}.*

  - package:
      name: ${{ name }}-core
    build:
      noarch: python
      script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
    requirements:
      host:
        - python ${{ python_min }}.*
        - pip
        - setuptools
      run:
        - python >=${{ python_min }}
        - google-api-core-grpc >=2.11.1,<3.0.0
        - google-auth >=2.14.1,<3.0.0
        - google-cloud-core >=2.4.1,<3.0.0
        - google-resumable-media >=2.0.0,<3.0.0
        - packaging >=20.0.0
        - python-dateutil >=2.7.3,<3.0.0
        - requests >=2.21.0,<3.0.0
    tests:
      - python:
          imports:
            - google.api_core
            - google.cloud.bigquery
            - google.cloud.bigquery.client
            - google.cloud.bigquery.dataset
            - google.cloud.bigquery.encryption_configuration
            - google.cloud.bigquery.enums
            - google.cloud.bigquery.external_config
            - google.cloud.bigquery.job
            - google.cloud.bigquery.model
            - google.cloud.bigquery.query
            - google.cloud.bigquery.retry
            - google.cloud.bigquery.routine
            - google.cloud.bigquery.schema
            - google.cloud.bigquery.table
          pip_check: true
          python_version: ${{ python_min }}.*

about:
  homepage: https://github.com/googleapis/google-cloud-python/tree/main/packages/google-cloud-bigquery
  license: Apache-2.0
  license_file: LICENSE
  summary: BigQuery API client library
  documentation: https://googleapis.dev/python/bigquery/latest/index.html
  repository: https://github.com/googleapis/google-cloud-python/tree/main/packages/google-cloud-bigquery

extra:
  recipe-maintainers:
    - chalmerlowe
    - xylar
    - parthea
    - tswast
